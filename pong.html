<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 400px;
            background: #1a1a1a;
            border: 3px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5), 0 0 40px rgba(102, 126, 234, 0.5);
            overflow: hidden;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            width: 100%;
            padding: 15px 0;
            background: rgba(0, 0, 0, 0.7);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            color: #00ff00;
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
        }

        .score-item {
            flex: 1;
        }

        .centerline {
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                #00ff00 0px,
                #00ff00 10px,
                transparent 10px,
                transparent 20px
            );
            z-index: 1;
        }

        .paddle {
            position: absolute;
            width: 10px;
            height: 80px;
            background: #00ff00;
            border: 2px solid #00aa00;
            box-shadow: 0 0 10px #00ff00;
            top: 50%;
            transform: translateY(-50%);
            z-index: 5;
        }

        .paddle-left {
            left: 10px;
        }

        .paddle-right {
            right: 10px;
        }

        #ball {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff00ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff00ff;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
        }

        .controls {
            color: white;
            text-align: center;
            font-size: 0.95em;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .controls p {
            margin: 5px 0;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        button {
            padding: 10px 20px;
            font-size: 1em;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            background: #764ba2;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            color: #00ff00;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            z-index: 100;
            display: none;
            box-shadow: 0 0 30px #00ff00;
        }

        .game-over h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 1.5em;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        
        <div id="gameContainer">
            <div class="scoreboard">
                <div class="score-item">
                    <div>PLAYER</div>
                    <div id="playerScore">0</div>
                </div>
                <div class="score-item">
                    <div>AI</div>
                    <div id="aiScore">0</div>
                </div>
            </div>

            <div class="centerline"></div>
            <div id="ball"></div>
            <div class="paddle paddle-left" id="playerPaddle"></div>
            <div class="paddle paddle-right" id="aiPaddle"></div>

            <div class="game-over" id="gameOver">
                <h2 id="gameOverTitle">Game Over!</h2>
                <p id="gameOverMessage"></p>
                <button onclick="resetGame()">Play Again</button>
            </div>
        </div>

        <div class="controls">
            <p><strong>Controls:</strong></p>
            <p>🖱️ Mouse Y position to move left paddle</p>
            <p>⬆️ Arrow Up / ⬇️ Arrow Down to move left paddle</p>
            <p><strong>Win Condition:</strong> First to 5 points wins!</p>
            <div class="button-group">
                <button onclick="startGame()">Start Game</button>
                <button onclick="resetGame()">Reset Score</button>
            </div>
        </div>
    </div>

    <script>
        // Game Constants
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 400;
        const PADDLE_HEIGHT = 80;
        const PADDLE_WIDTH = 10;
        const BALL_SIZE = 10;
        const PADDLE_SPEED = 6;
        const BALL_SPEED = 4;
        const WIN_SCORE = 5;

        // Game Objects
        const game = {
            running: false,
            gameOver: false,
            playerScore: 0,
            aiScore: 0
        };

        const playerPaddle = {
            x: 10,
            y: GAME_HEIGHT / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            speed: PADDLE_SPEED,
            mouseY: GAME_HEIGHT / 2
        };

        const aiPaddle = {
            x: GAME_WIDTH - PADDLE_WIDTH - 10,
            y: GAME_HEIGHT / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            speed: PADDLE_SPEED * 0.75
        };

        const ball = {
            x: GAME_WIDTH / 2,
            y: GAME_HEIGHT / 2,
            size: BALL_SIZE,
            velocityX: BALL_SPEED,
            velocityY: BALL_SPEED,
            speed: BALL_SPEED
        };

        // Input Handling
        const keys = {};

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (['ArrowUp', 'ArrowDown'].includes(e.key)) {
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        window.addEventListener('mousemove', (e) => {
            const gameContainer = document.getElementById('gameContainer');
            const rect = gameContainer.getBoundingClientRect();
            playerPaddle.mouseY = e.clientY - rect.top;
        });

        // Update Functions
        function updatePlayerPaddle() {
            let targetY = playerPaddle.mouseY - playerPaddle.height / 2;

            // Also allow arrow keys
            if (keys['ArrowUp']) {
                targetY = playerPaddle.y - playerPaddle.speed;
            } else if (keys['ArrowDown']) {
                targetY = playerPaddle.y + playerPaddle.speed;
            }

            // Boundary checking
            if (targetY < 50) {
                targetY = 50;
            } else if (targetY + playerPaddle.height > GAME_HEIGHT) {
                targetY = GAME_HEIGHT - playerPaddle.height;
            }

            playerPaddle.y = targetY;
        }

        function updateAIPaddle() {
            const aiCenter = aiPaddle.y + aiPaddle.height / 2;
            const ballCenter = ball.y;

            // AI difficulty: aim for the center of the paddle to be at ball's y position
            const difficulty = 0.8;
            if (aiCenter < ballCenter - 10) {
                aiPaddle.y += aiPaddle.speed * difficulty;
            } else if (aiCenter > ballCenter + 10) {
                aiPaddle.y -= aiPaddle.speed * difficulty;
            }

            // Boundary checking
            if (aiPaddle.y < 50) {
                aiPaddle.y = 50;
            } else if (aiPaddle.y + aiPaddle.height > GAME_HEIGHT) {
                aiPaddle.y = GAME_HEIGHT - aiPaddle.height;
            }
        }

        function updateBall() {
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Top and bottom collision
            if (ball.y - ball.size / 2 < 50) {
                ball.y = 50 + ball.size / 2;
                ball.velocityY = -ball.velocityY;
            }
            if (ball.y + ball.size / 2 > GAME_HEIGHT) {
                ball.y = GAME_HEIGHT - ball.size / 2;
                ball.velocityY = -ball.velocityY;
            }

            // Player paddle collision
            if (
                ball.x - ball.size / 2 < playerPaddle.x + playerPaddle.width &&
                ball.y > playerPaddle.y &&
                ball.y < playerPaddle.y + playerPaddle.height
            ) {
                ball.x = playerPaddle.x + playerPaddle.width + ball.size / 2;
                ball.velocityX = -ball.velocityX;

                // Add spin based on where the ball hits the paddle
                const hitPos = (ball.y - playerPaddle.y) / playerPaddle.height;
                ball.velocityY = (hitPos - 0.5) * 6;
            }

            // AI paddle collision
            if (
                ball.x + ball.size / 2 > aiPaddle.x &&
                ball.y > aiPaddle.y &&
                ball.y < aiPaddle.y + aiPaddle.height
            ) {
                ball.x = aiPaddle.x - ball.size / 2;
                ball.velocityX = -ball.velocityX;

                // Add spin based on where the ball hits the paddle
                const hitPos = (ball.y - aiPaddle.y) / aiPaddle.height;
                ball.velocityY = (hitPos - 0.5) * 6;
            }

            // Left side (player loses)
            if (ball.x < 0) {
                game.aiScore++;
                updateScore();
                resetBall();
                if (game.aiScore >= WIN_SCORE) {
                    endGame(false);
                }
            }

            // Right side (AI loses)
            if (ball.x > GAME_WIDTH) {
                game.playerScore++;
                updateScore();
                resetBall();
                if (game.playerScore >= WIN_SCORE) {
                    endGame(true);
                }
            }
        }

        function resetBall() {
            ball.x = GAME_WIDTH / 2;
            ball.y = GAME_HEIGHT / 2;
            ball.velocityX = (Math.random() > 0.5 ? 1 : -1) * BALL_SPEED;
            ball.velocityY = (Math.random() - 0.5) * BALL_SPEED * 2;
        }

        function updateScore() {
            document.getElementById('playerScore').textContent = game.playerScore;
            document.getElementById('aiScore').textContent = game.aiScore;
        }

        // Rendering
        function render() {
            const playerPaddleEl = document.getElementById('playerPaddle');
            const aiPaddleEl = document.getElementById('aiPaddle');
            const ballEl = document.getElementById('ball');

            playerPaddleEl.style.top = playerPaddle.y + 'px';
            aiPaddleEl.style.top = aiPaddle.y + 'px';
            ballEl.style.left = ball.x + 'px';
            ballEl.style.top = ball.y + 'px';
        }

        // Game Loop
        function gameLoop() {
            if (game.running && !game.gameOver) {
                updatePlayerPaddle();
                updateAIPaddle();
                updateBall();
                render();
            }
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (!game.running) {
                game.running = true;
                game.gameOver = false;
                document.getElementById('gameOver').style.display = 'none';
                if (game.playerScore === 0 && game.aiScore === 0) {
                    resetBall();
                }
            }
        }

        function resetGame() {
            game.running = false;
            game.gameOver = false;
            game.playerScore = 0;
            game.aiScore = 0;
            updateScore();
            resetBall();
            document.getElementById('gameOver').style.display = 'none';
        }

        function endGame(playerWins) {
            game.running = false;
            game.gameOver = true;
            const gameOverEl = document.getElementById('gameOver');
            const titleEl = document.getElementById('gameOverTitle');
            const messageEl = document.getElementById('gameOverMessage');

            if (playerWins) {
                titleEl.textContent = '🎉 You Win!';
                messageEl.textContent = `Final Score: ${game.playerScore} - ${game.aiScore}`;
            } else {
                titleEl.textContent = '💀 Game Over!';
                messageEl.textContent = `Final Score: ${game.playerScore} - ${game.aiScore}`;
            }

            gameOverEl.style.display = 'block';
        }

        // Start the game loop
        gameLoop();
    </script>
</body>
</html>
